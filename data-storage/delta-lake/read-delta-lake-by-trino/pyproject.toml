[project]
name = "read-delta-lake-by-trino"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "pandas==3.0.2",
  "pydantic-settings==2.13.1",
  "trino[sqlalchemy]==0.337.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
