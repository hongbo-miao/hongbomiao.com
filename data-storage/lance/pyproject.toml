[project]
name = "lance"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "pandas==3.0.3",
  "polars==1.41.2",
  "pylance==7.0.0",
  "tqdm==4.67.3",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
