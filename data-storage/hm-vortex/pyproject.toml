[project]
name = "hm-vortex"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "polars==1.40.0",
  "pyarrow==24.0.0",
  "vortex-data==0.69.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
