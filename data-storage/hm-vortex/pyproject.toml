[project]
name = "hm-vortex"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "polars==1.39.3",
  "pyarrow==23.0.1",
  "vortex-data==0.66.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.42.1",
  "pytest-cov==7.1.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
