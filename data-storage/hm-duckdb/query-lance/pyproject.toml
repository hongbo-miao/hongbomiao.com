[project]
name = "query-parquet"
version = "1.0.0"
requires-python = "==3.14.6"
dependencies = [
  "duckdb==1.5.3",
  "lancedb==0.33.0",
  "polars==1.41.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
