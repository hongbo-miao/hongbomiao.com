[project]
name = "query-protobuf"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "duckdb==1.5.3",
  "polars[pyarrow]==1.40.1",
  "protobuf==7.34.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
generate-descriptor = "protoc -o data/motor_descriptor.pb src/protos/production.iot.motor.proto"
