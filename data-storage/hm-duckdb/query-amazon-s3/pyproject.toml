[project]
name = "query-amazon-s3"
version = "1.0.0"
requires-python = "==3.14.6"
dependencies = [
  "duckdb==1.5.3",
  "polars[pyarrow]==1.41.2",
  "pydantic-settings==2.14.1",
  "xxhash==3.7.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
