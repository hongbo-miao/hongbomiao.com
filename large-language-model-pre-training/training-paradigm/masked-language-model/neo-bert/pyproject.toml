[project]
name = "neo-bert"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "torch==2.11.0",
  "transformers==5.4.0",
  "xformers==0.0.35",
]

[dependency-groups]
dev = [
  "poethepoet==0.43.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
