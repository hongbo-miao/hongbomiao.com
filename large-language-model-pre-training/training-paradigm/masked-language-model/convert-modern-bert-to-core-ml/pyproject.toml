[project]
name = "convert-modern-bert-to-core-ml"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "coremltools==9.0",
  "numpy==2.4.6",
  "torch==2.12.1",
  "transformers==5.10.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
