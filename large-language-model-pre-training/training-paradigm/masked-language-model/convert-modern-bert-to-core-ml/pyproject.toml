[project]
name = "convert-modern-bert-to-core-ml"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "coremltools==9.0",
  "numpy==2.4.4",
  "torch==2.11.0",
  "transformers==5.5.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
