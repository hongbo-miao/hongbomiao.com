[project]
name = "automatic-mixed-precision"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "deepspeed==0.19.0",
  "mpi4py==4.1.2",
  "torch==2.12.0",
  "torchvision==0.27.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
