[project]
name = "hm-sunpy"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "matplotlib==3.10.9",
  "scipy==1.17.1",
  "sunpy[all]==7.1.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
