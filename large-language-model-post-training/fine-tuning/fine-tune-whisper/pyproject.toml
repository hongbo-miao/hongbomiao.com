[project]
name = "fine-tune-whisper"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "datasets==4.8.4",
  "evaluate==0.4.6",
  "jiwer==4.0.0",
  "torch==2.11.0",
  "transformers[audio,torch]==5.5.3",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "torchrun --nproc_per_node=1 src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
