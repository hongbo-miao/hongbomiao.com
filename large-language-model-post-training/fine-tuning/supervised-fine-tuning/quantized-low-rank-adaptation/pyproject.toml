[project]
name = "supervised-fine-tuning-quantized-low-rank-adaptation"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "bitsandbytes==0.49.2",
  "datasets==4.8.4",
  "peft==0.18.1",
  "transformers==5.5.0",
  "trl==0.29.1",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "accelerate launch src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
