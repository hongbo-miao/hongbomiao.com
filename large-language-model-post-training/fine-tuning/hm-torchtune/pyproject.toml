[project]
name = "hm-torchtune"
version = "1.0.0"
requires-python = "==3.13.12"
dependencies = [
  "tensorboard==2.20.0",
  "torch==2.11.0",
  "torchao==0.17.0",
  "torchtune==0.6.1",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
