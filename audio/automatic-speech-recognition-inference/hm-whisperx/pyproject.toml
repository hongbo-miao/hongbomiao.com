[project]
name = "hm-whisperx"
version = "1.0.0"
requires-python = "==3.12.13"
dependencies = [
  "httpx==0.28.1",
  "scipy==1.17.1",
  "sounddevice==0.5.5",
  "torch==2.8.0",
  "whisperx==3.8.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
