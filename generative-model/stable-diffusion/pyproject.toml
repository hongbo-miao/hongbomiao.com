[project]
name = "stable-diffusion"
version = "1.0.0"
requires-python = "==3.14.6"
dependencies = [
  "accelerate==1.13.0",
  "diffusers==0.37.1",
  "torch==2.12.0",
  "transformers==5.10.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
