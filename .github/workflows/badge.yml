---
name: Badge

'on':
  push:
    branches:
      - main

jobs:
  count-code-lines:
    name: Count Code Lines
    runs-on: ubuntu-24.04-arm
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        with:
          packages: cloc
          version: 1.0
      - name: Count code lines
        run: |
          echo "CODE_LINE_COUNT=$(.github/scripts/count_code_lines.sh)" >> $GITHUB_ENV
      - name: Create badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ecff3e2b8226a5c1406b0c2e2622e968
          filename: code_line_count.json
          label: code lines
          labelColor: gray
          message: ${{ env.CODE_LINE_COUNT }}
          color: blue
