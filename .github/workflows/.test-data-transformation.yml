---
name: . Test Data Transformation

'on':
  workflow_call:
    inputs:
      # Workflows
      workflow:
        required: true
        type: boolean
      # Applications
      dbt-hm-postgres:
        required: true
        type: boolean

jobs:
  dbt-hm-postgres-test:
    name: dbt (hm-postgres) | Test
    if: ${{ inputs.workflow || inputs.dbt-hm-postgres }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: data-transformation/dbt/projects/dbt_hm_postgres/uv.lock
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: data-transformation/dbt/projects/dbt_hm_postgres/.python-version
      - name: Install dependencies
        working-directory: data-transformation/dbt/projects/dbt_hm_postgres
        run: |
          uv sync --dev
      - name: Test
        working-directory: data-transformation/dbt/projects/dbt_hm_postgres
        run: |
          uv run poe test-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hongbo-miao/hongbomiao.com
          directory: data-transformation/dbt/projects/dbt_hm_postgres
