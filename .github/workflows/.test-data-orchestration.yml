---
name: . Test Data Orchestration

'on':
  workflow_call:
    inputs:
      # Workflows
      workflow:
        required: true
        type: boolean
      # Applications
      hm-airflow:
        required: true
        type: boolean
      hm-prefect-calculate:
        required: true
        type: boolean
      hm-prefect-daft-analysis:
        required: true
        type: boolean
      hm-prefect-greet:
        required: true
        type: boolean
      hm-prefect-ingest-parquet-to-iceberg:
        required: true
        type: boolean

jobs:
  airflow-test:
    name: Airflow | Test
    if: ${{ inputs.workflow || inputs.hm-airflow }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: data-orchestration/hm-airflow/uv.lock
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: data-orchestration/hm-airflow/.python-version
      - name: Install dependencies
        working-directory: data-orchestration/hm-airflow
        run: |
          uv sync --dev
      - name: Test
        working-directory: data-orchestration/hm-airflow
        run: |
          uv run poe test-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hongbo-miao/hongbomiao.com
          directory: data-orchestration/hm-airflow

  prefect-calculate-test:
    name: Prefect (calculate) | Test
    if: ${{ inputs.workflow || inputs.hm-prefect-calculate }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: data-orchestration/hm-prefect/workflows/calculate/uv.lock
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: data-orchestration/hm-prefect/workflows/calculate/.python-version
      - name: Install dependencies
        working-directory: data-orchestration/hm-prefect/workflows/calculate
        run: |
          uv sync --dev
      - name: Test
        working-directory: data-orchestration/hm-prefect/workflows/calculate
        run: |
          uv run poe test-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hongbo-miao/hongbomiao.com
          directory: data-orchestration/hm-prefect/workflows/calculate

  prefect-daft-analysis-test:
    name: Prefect (daft-analysis) | Test
    if: ${{ inputs.workflow || inputs.hm-prefect-daft-analysis }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: data-orchestration/hm-prefect/workflows/daft-analysis/uv.lock
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: data-orchestration/hm-prefect/workflows/daft-analysis/.python-version
      - name: Install dependencies
        working-directory: data-orchestration/hm-prefect/workflows/daft-analysis
        run: |
          uv sync --dev
      - name: Test
        working-directory: data-orchestration/hm-prefect/workflows/daft-analysis
        run: |
          uv run poe test-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hongbo-miao/hongbomiao.com
          directory: data-orchestration/hm-prefect/workflows/daft-analysis

  prefect-greet-test:
    name: Prefect (greet) | Test
    if: ${{ inputs.workflow || inputs.hm-prefect-greet }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: data-orchestration/hm-prefect/workflows/greet/uv.lock
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: data-orchestration/hm-prefect/workflows/greet/.python-version
      - name: Install dependencies
        working-directory: data-orchestration/hm-prefect/workflows/greet
        run: |
          uv sync --dev
      - name: Test
        working-directory: data-orchestration/hm-prefect/workflows/greet
        run: |
          uv run poe test-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hongbo-miao/hongbomiao.com
          directory: data-orchestration/hm-prefect/workflows/greet

  prefect-ingest-parquet-to-iceberg-test:
    name: Prefect (ingest-parquet-to-iceberg) | Test
    if: ${{ inputs.workflow || inputs.hm-prefect-ingest-parquet-to-iceberg }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: 0.11.7
          enable-cache: true
          cache-dependency-glob: data-orchestration/hm-prefect/workflows/ingest-parquet-to-iceberg/uv.lock
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: data-orchestration/hm-prefect/workflows/ingest-parquet-to-iceberg/.python-version
      - name: Install dependencies
        working-directory: data-orchestration/hm-prefect/workflows/ingest-parquet-to-iceberg
        run: |
          uv sync --dev
      - name: Test
        working-directory: data-orchestration/hm-prefect/workflows/ingest-parquet-to-iceberg
        run: |
          uv run poe test-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: hongbo-miao/hongbomiao.com
          directory: data-orchestration/hm-prefect/workflows/ingest-parquet-to-iceberg
