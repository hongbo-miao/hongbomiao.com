---
name: Auto Assign

'on':
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - ready_for_review

jobs:
  auto-assign:
    name: Auto Assign
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Auto assign
        uses: kentaro-m/auto-assign-action@0a2c53d3721e4c5cfcce6afd4014aecc337979f6 # v2.0.2
        with:
          configuration-path: .github/auto-assign.yml
