[project]
name = "pytorch-mnist"
version = "1.0.0"
requires-python = "==3.13.14"
dependencies = [
  "torch==2.12.0",
  "torchvision==0.27.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
  "sagemaker==3.13.1",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
