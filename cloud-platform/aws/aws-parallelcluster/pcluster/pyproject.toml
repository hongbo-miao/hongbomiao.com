[project]
name = "pcluster"
version = "1.0.0"
requires-python = "==3.14.4"

[dependency-groups]
dev = [
  "aws-parallelcluster==3.15.0",
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
