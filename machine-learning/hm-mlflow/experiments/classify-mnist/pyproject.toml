[project]
name = "classify-mnist"
version = "1.0.0"
requires-python = "==3.13.12"
dependencies = [
  "lightning==2.6.1",
  "mlflow==3.11.1",
  "nvidia-ml-py==13.595.45",
  "psutil==7.2.2",
  "pydantic-settings==2.13.1",
  "torch==2.11.0",
  "torchvision==0.26.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
