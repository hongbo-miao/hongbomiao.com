[project]
name = "classify-mnist"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "lightning==2.6.5",
  "mlflow==3.13.0",
  "nvidia-ml-py==13.610.43",
  "psutil==7.2.2",
  "pydantic-settings==2.14.2",
  "torch==2.12.1",
  "torchvision==0.27.1",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
