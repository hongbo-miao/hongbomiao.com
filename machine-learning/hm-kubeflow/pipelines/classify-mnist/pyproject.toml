[project]
name = "classify-mnist"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "kfp==2.16.1",
  "torch==2.12.1",
  "torchvision==0.27.1",
  "lightning==2.6.5",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
