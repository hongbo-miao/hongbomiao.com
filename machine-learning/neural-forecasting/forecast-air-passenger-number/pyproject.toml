[project]
name = "forecast-air-passenger-number"
version = "1.0.0"
requires-python = "==3.12.13"
dependencies = [
  "matplotlib==3.10.8",
  "neuralforecast==3.1.6",
  "pandas==3.0.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.43.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
