[project]
name = "infer"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "boto3==1.42.97",
  "gevent==26.5.0",
  "geventhttpclient==2.3.9",
  "numpy==1.26.4",
  "orjson==3.11.9",
  "pillow==12.2.0",
  "tritonclient==2.68.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
