[project]
name = "hm-imagebind"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "gradio==6.12.0",
  "httpx==0.28.1",
  "imagebind",
  "lancedb==0.30.2",
  "numpy==2.4.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.uv.sources]
imagebind = { git = "https://github.com/facebookresearch/ImageBind" }

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
