[project]
name = "mount-saint-helens"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "pyvista==0.47.3",
  "lancedb==0.30.2",
  "open-clip-torch==3.3.0",
  "pillow==12.2.0",
  "pandas==3.0.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
