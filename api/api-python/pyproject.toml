[project]
name = "api-python"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "confluent-kafka==2.13.2",
  "fastapi==0.135.1",
  "httpx==0.28.1",
  "lancedb==0.29.2",
  "mem0ai==1.0.6",
  "openai==2.29.0",
  "pydantic-ai-slim[openai]==1.70.0",
  "pydantic-settings==2.13.1",
  "sentence-transformers==5.3.0",
  "sentry-sdk[fastapi]==2.54.0",
  "uvicorn==0.42.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.42.1",
  "pytest-cov==7.0.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
serve = { cmd = "python src/main.py", env = { ENVIRONMENT = "production" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
