[project]
name = "api-python"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "confluent-kafka==2.14.0",
  "fastapi==0.136.0",
  "httpx==0.28.1",
  "lance-namespace==0.7.0",
  "lancedb==0.30.2",
  "mem0ai==2.0.0",
  "openai==2.32.0",
  "pydantic-ai-slim[openai]==1.84.1",
  "pydantic-settings==2.14.0",
  "sentence-transformers==5.4.1",
  "sentry-sdk[fastapi]==2.58.0",
  "uvicorn==0.44.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
serve = { cmd = "python src/main.py", env = { ENVIRONMENT = "production" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
