[project]
name = "api-python"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "confluent-kafka==2.14.0",
  "fastapi==0.136.3",
  "httpx==0.28.1",
  "lance-namespace==0.7.7",
  "lancedb==0.33.0",
  "mem0ai==2.0.4",
  "openai==2.38.0",
  "pydantic-ai-slim[openai]==1.104.0",
  "pydantic-settings==2.14.1",
  "sentence-transformers==5.5.1",
  "sentry-sdk[fastapi]==2.58.0",
  "uvicorn==0.45.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
serve = { cmd = "python src/main.py", env = { ENVIRONMENT = "production" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
