[project]
name = "api-rust-scripts"
version = "1.0.0"
requires-python = "==3.14.5"

[dependency-groups]
dev = [
  "httpx==0.28.1",
  "onnx==1.21.0",
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
  "torch==2.12.0",
  "torchvision==0.27.0",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
download-model = "python src/download_model.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
