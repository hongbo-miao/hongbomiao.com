[package]
name = "api-rust"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
async-graphql = "=7.2.1"
async-graphql-axum = "=7.2.1"
async-nats = "=0.49.0"
async-openai = { version = "=0.40.2", features = ["chat-completion"] }
axum = { version = "=0.8.9", features = ["ws"] }
dotenvy = "=0.15.7"
wtransport = "=0.7.1"
ffmpeg-sidecar = { version = "=2.5.1", features = ["download_ffmpeg"] }
futures-util = "=0.3.32"
hound = "=3.5.1"
ndarray = "=0.15.6"
once_cell = "=1.21.4"
opencv = "=0.98.2"
ort = "=1.16.3"
pyo3 = { version = "=0.28.3", features = ["auto-initialize"] }
rayon = "=1.12.0"
reqwest = { version = "=0.13.4", features = ["json", "multipart", "stream"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
sqlx = { version = "=0.9.0", features = ["json", "postgres", "runtime-tokio"] }
tokio = { version = "=1.52.3", features = ["full"] }
tokio-stream = { version = "=0.1.18", features = ["sync"] }
tower = "=0.5.3"
tower-http = { version = "=0.6.11", features = [
  "compression-zstd",
  "cors",
  "timeout",
  "trace",
] }
tower_governor = "=0.8.0"
tracing = "=0.1.44"
tracing-subscriber = "=0.3.23"
utoipa = { version = "=5.5.0", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "=9.0.2", features = ["axum"] }
webrtc-vad = "=0.4.0"

[dev-dependencies]
axum-test = "=20.1.0"
