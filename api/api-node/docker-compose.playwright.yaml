# https://docs.docker.com/reference/compose-file/
---
name: api-node-playwright
services:
  api-node:
    build:
      context: ../..
      dockerfile: api/api-node/Dockerfile.development
    container_name: hm_api_node
    depends_on:
      - postgres
      - redis
    env_file:
      - .env.development.local.example.docker
    environment:
      - POSTGRES_HOST=127.0.0.1
      - REDIS_HOST=127.0.0.1
    network_mode: "host"
    restart: unless-stopped

  postgres:
    image: postgres:18.3-alpine
    container_name: hm_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init_up.sql:/docker-entrypoint-initdb.d/init.sql
    env_file:
      - ./postgres/.env.development.local.example
    network_mode: "host"
    restart: unless-stopped

  redis:
    image: redis:8.6.2-alpine
    container_name: hm_redis
    volumes:
      - redis_data:/data
    network_mode: "host"
    restart: unless-stopped

volumes:
  redis_data: {}
  postgres_data: {}
