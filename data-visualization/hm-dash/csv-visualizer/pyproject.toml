[project]
name = "csv-visualizer"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "dash==4.1.0",
  "polars[pyarrow]==1.39.3",
  "plotly[express]==6.6.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
