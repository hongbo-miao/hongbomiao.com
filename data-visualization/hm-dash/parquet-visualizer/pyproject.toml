[project]
name = "parquet-visualizer"
version = "1.0.0"
requires-python = "==3.12.12"
dependencies = [
  "daft[sql]==0.7.4",
  "dash==4.0.0",
  "gunicorn==25.1.0",
  "numpy==2.4.2",
  "pandas==3.0.1",
  "plotly==6.6.0",
  "trino[sqlalchemy]==0.336.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.42.1",
  "pytest-cov==7.0.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
