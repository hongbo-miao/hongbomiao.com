[project]
name = "parquet-visualizer"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "daft[sql]==0.7.8",
  "dash==4.1.0",
  "gunicorn==25.3.0",
  "numpy==2.4.4",
  "pandas==3.0.2",
  "plotly==6.6.0",
  "trino[sqlalchemy]==0.337.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
