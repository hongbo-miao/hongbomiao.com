[project]
name = "hm-geopandas"
version = "1.0.0"
requires-python = "==3.14.6"
dependencies = [
  "geodatasets==2026.5.1",
  "geopandas==1.1.3",
  "mapclassify==2.10.0",
  "matplotlib==3.10.9",
  "pyarrow==24.0.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
