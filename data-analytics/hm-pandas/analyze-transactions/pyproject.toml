[project]
name = "analyze-transactions"
version = "1.0.0"
requires-python = "==3.13.12"
dependencies = [
  "httpx==0.28.1",
  "pandas==3.0.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
