[project]
name = "hm-marimo"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "marimo==0.22.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
edit = " marimo edit src/main.py"
run = " marimo run src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
