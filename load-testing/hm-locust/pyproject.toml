[project]
name = "hm-locust"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "locust==2.43.4",
  "pydantic-settings==2.13.1",
  "python-magic==0.4.27",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "locust --config=src/locust.conf"
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
