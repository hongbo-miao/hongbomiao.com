[project]
name = "dinov3"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "gradio==6.17.3",
  "httpx==0.28.1",
  "matplotlib==3.10.9",
  "torch==2.12.1",
  "torchvision==0.27.1",
  "transformers==5.10.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
