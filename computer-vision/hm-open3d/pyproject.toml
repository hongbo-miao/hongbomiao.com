[project]
name = "hm-open3d"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "PyYAML==6.0.3",
  "addict==2.4.0",
  "open3d==0.19.0",
  "pillow==12.2.0",
  "scikit-learn==1.8.0",
  "tqdm==4.67.3",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"

open3d-example = "open3d example visualization/draw"
