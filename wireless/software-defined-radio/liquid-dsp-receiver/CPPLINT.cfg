# Include order is governed by clang-format (IncludeBlocks: Regroup), which puts
# the <*.h> C library headers first; that conflicts with cpplint's expected order.
filter=-build/include_order
# SoapySDR's readStream requires a long long timeNs argument.
filter=-runtime/int
# build/ holds compiled output and the vendored redsea source.
exclude_files=build
