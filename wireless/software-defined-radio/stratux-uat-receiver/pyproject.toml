[project]
name = "stratux-uat-receiver"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "pydantic==2.13.4",
  "pyftdi==0.56.0",
  "pyserial==3.5",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
listen = "python src/listen_raw.py"
simulate = "python src/main.py --simulate"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
