[project]
name = "actor-critic-algorithm"
version = "1.0.0"
requires-python = "==3.13.14"
dependencies = [
  "gymnasium[classic-control]==1.3.0",
  "torch==2.12.1",
  "numpy==2.4.6",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
