# https://github.com/nimtable/nimtable/blob/main/docker/docker-compose.yml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hm-nimtable-web-deployment
  namespace: production-hm-nimtable
  labels:
    app.kubernetes.io/name: nimtable-web
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: production-hm-nimtable
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nimtable-web
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nimtable-web
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: nimtable-web
          image: ghcr.io/nimtable/nimtable-web:nightly
          ports:
            - containerPort: 3000
          env:
            - name: JAVA_API_URL
              value: http://hm-nimtable-service:8182
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hm-nimtable-secret
                  key: NIMTABLE_WEB_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hm-nimtable-secret
                  key: JWT_SECRET
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hm-nimtable-secret
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hm-nimtable-secret
                  key: ADMIN_PASSWORD
          resources:
            requests:
              cpu: 10m
              memory: 200Mi
            limits:
              memory: 500Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      nodeSelector:
        environment: production
      tolerations:
        - key: environment
          operator: Equal
          value: production
          effect: NoSchedule
