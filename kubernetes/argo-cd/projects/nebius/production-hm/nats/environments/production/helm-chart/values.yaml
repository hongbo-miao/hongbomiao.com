# https://github.com/nats-io/k8s/blob/main/helm/charts/nats/values.yaml
---
global:
  image:
    registry: harbor.hongbomiao.com/docker-hub-proxy-cache
config:
  cluster:
    enabled: true
    replicas: 5
  jetstream:
    enabled: true
    fileStore:
      pvc:
        size: 5Ti
        storageClassName: production-hm-nats-storage-class
  merge:
    jetstream:
      max_memory_store: 268435456  # 256Mi
    authorization:
      token: << $NATS_AUTH_TOKEN >>
container:
  env:
    NATS_AUTH_TOKEN:
      valueFrom:
        secretKeyRef:
          name: hm-nats-secret
          key: NATS_AUTH_TOKEN
  patch:
    - op: replace
      path: /startupProbe
      value:
        httpGet:
          path: /healthz
          port: monitor
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 360  # 360 * 10 = 3600 seconds (60 min) to start
    - op: replace
      path: /livenessProbe
      value:
        httpGet:
          path: /healthz?js-server-only=true
          port: monitor
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 20  # 20 * 30 = 600 seconds (10 min) before killing
  resources:
    requests:
      cpu: 1
      memory: 1Gi
    limits:
      memory: 15Gi
promExporter:
  enabled: true
  image:
    registry: harbor.hongbomiao.com/docker-hub-proxy-cache
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 200Mi
  podMonitor:
    enabled: true
service:
  # ports:
  #   leafnodes:
  #     enabled: true
  merge:
    spec:
      type: LoadBalancer
    metadata:
      annotations:
        # https://kubernetes-sigs.github.io/external-dns/latest/docs/annotations/annotations
        external-dns.alpha.kubernetes.io/hostname: nats.hongbomiao.com
podTemplate:
  topologySpreadConstraints:
    kubernetes.io/hostname:
      maxSkew: 1
      whenUnsatisfiable: DoNotSchedule
  merge:
    spec:
      nodeSelector:
        environment: production
      tolerations:
        - key: environment
          operator: Equal
          value: production
          effect: NoSchedule
podDisruptionBudget:
  enabled: true
  merge:
    spec:
      maxUnavailable: 1
natsBox:
  container:
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 200Mi
  podTemplate:
    merge:
      spec:
        nodeSelector:
          environment: production
        tolerations:
          - key: environment
            operator: Equal
            value: production
            effect: NoSchedule
reloader:
  merge:
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 200Mi
