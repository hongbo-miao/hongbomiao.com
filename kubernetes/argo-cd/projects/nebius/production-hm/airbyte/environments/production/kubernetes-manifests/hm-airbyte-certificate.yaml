# https://cert-manager.io/docs/usage/certificate
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hm-airbyte-certificate
  namespace: production-hm-airbyte
  labels:
    app.kubernetes.io/name: airbyte
    app.kubernetes.io/part-of: production-hm-airbyte
spec:
  secretName: hm-airbyte-certificate
  issuerRef:
    name: hm-lets-encrypt-cluster-issuer
    kind: ClusterIssuer
  dnsNames:
    - airbyte.hongbomiao.com
  privateKey:
    algorithm: ECDSA
    size: 384
    rotationPolicy: Always
