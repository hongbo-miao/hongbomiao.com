# https://github.com/goharbor/harbor-helm/blob/main/values.yaml
---
logLevel: info
expose:
  type: ingress
  tls:
    enabled: true
    certSource: secret
    secret:
      secretName: hm-harbor-certificate
  ingress:
    hosts:
      core: harbor.hongbomiao.com
    # https://serverfault.com/a/1197875/344438
    className: nginx
    annotations:
      external-dns.alpha.kubernetes.io/hostname: harbor.hongbomiao.com
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
externalURL: https://harbor.hongbomiao.com
existingSecretAdminPassword: hm-harbor-secret
existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
core:
  replicas: 5
  nodeSelector:
    environment: production
  tolerations:
    - key: environment
      operator: Equal
      value: production
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: harbor
              component: core
          topologyKey: kubernetes.io/hostname
  resources:
    requests:
      cpu: 20m
      memory: 100Mi
    limits:
      memory: 200Mi
jobservice:
  replicas: 5
  nodeSelector:
    environment: production
  tolerations:
    - key: environment
      operator: Equal
      value: production
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: harbor
              component: jobservice
          topologyKey: kubernetes.io/hostname
  jobLoggers:
    - stdout
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 200Mi
portal:
  replicas: 3
  nodeSelector:
    environment: production
  tolerations:
    - key: environment
      operator: Equal
      value: production
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: harbor
              component: portal
          topologyKey: kubernetes.io/hostname
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      memory: 200Mi
registry:
  replicas: 5
  nodeSelector:
    environment: production
  tolerations:
    - key: environment
      operator: Equal
      value: production
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: harbor
              component: registry
          topologyKey: kubernetes.io/hostname
  registry:
    resources:
      requests:
        cpu: 300m
        memory: 600Mi
      limits:
        memory: 800Mi
  controller:
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 200Mi
trivy:
  replicas: 1
  nodeSelector:
    environment: production
  tolerations:
    - key: environment
      operator: Equal
      value: production
      effect: NoSchedule
  resources:
    requests:
      cpu: 10m
      memory: 300Mi
    limits:
      memory: 600Mi
redis:
  type: external
  external:
    addr: harbor-valkey.production-hm-harbor-valkey.svc:6379
    # https://github.com/goharbor/harbor-helm/issues/2148
    password: xxx
database:
  type: external
  external:
    host: private-rw.postgresql-xxxxxxxxxxxxxxxxxx.backbone-xxxxxxxxxxxxxxxxxx.msp.us-central1.nebius.cloud
    port: 5432
    username: harbor_user
    coreDatabase: harbor_db
    existingSecret: hm-harbor-secret
    sslmode: require
persistence:
  enabled: true
  resourcePolicy: keep
  persistentVolumeClaim:
    trivy:
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: production-hm-harbor-storage-class
  imageChartStorage:
    type: s3
    s3:
      region: us-central1
      endpoint: https://storage.us-central1.nebius.cloud
      bucket: production-hm-harbor
      existingSecret: hm-harbor-secret
      # 32 MiB, needs to be a string
      chunksize: "33554432"
