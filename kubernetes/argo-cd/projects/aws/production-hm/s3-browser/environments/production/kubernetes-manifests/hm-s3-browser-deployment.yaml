---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hm-s3-browser-deployment
  namespace: production-hm-s3-browser
  labels:
    app.kubernetes.io/name: s3-browser
    app.kubernetes.io/part-of: production-hm-s3-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: s3-browser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: s3-browser
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: s3-browser
          image: harbor.hongbomiao.com/docker-hub-proxy-cache/caddy:2.9.1-alpine
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            capabilities:
              add: ["NET_BIND_SERVICE"]
              drop: ["ALL"]
          ports:
            - name: s3-browser
              protocol: TCP
              containerPort: 8080
          volumeMounts:
            - name: caddyfile-volume
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
            - name: motor-data-volume
              mountPath: /srv/motor_data
            - name: battery-data-volume
              mountPath: /srv/battery_data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: caddyfile-volume
          configMap:
            name: hm-s3-browser-caddyfile-config-map
        - name: motor-data-volume
          persistentVolumeClaim:
            claimName: motor-data-persistent-volume-claim
        - name: battery-data-volume
          persistentVolumeClaim:
            claimName: battery-data-persistent-volume-claim
