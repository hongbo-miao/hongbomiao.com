[project]
name = "hm-llama-index-chat-pdf"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "llama-index-embeddings-huggingface==0.7.0",
  "llama-index-llms-litellm==0.7.1",
  "llama-index==0.14.20",
  "pydantic-settings==2.13.1",
  "sentence-transformers==5.3.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
