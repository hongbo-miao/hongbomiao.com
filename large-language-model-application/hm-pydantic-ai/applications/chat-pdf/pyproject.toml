[project]
name = "hm-pydantic-ai-chat-pdf"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "docling==2.86.0",
  "faiss-cpu==1.13.2",
  "openai==2.30.0",
  "pydantic-ai-slim[openai]==1.78.0",
  "pydantic-settings==2.13.1",
  "sentence-transformers==5.4.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = { cmd = "python src/main.py", env = { ENVIRONMENT = "development" } }
test = { cmd = "pytest --verbose --verbose", env = { ENVIRONMENT = "test" } }
test-coverage = { cmd = "pytest --cov=. --cov-report=xml", env = { ENVIRONMENT = "test" } }
