[package]
name = "audio-stream-transcriber"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
async-nats = "=0.49.1"
capnp = "=0.25.5"
chrono = "=0.4.45"
claxon = "=0.4.3"
dotenvy = "=0.15.7"
flacenc = "=0.5.1"
futures-util = "=0.3.32"
reqwest = { version = "=0.13.4", features = ["json", "multipart"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
serde_with = "=3.21.0"
tokio = { version = "=1.52.3", features = ["full"] }
tracing = "=0.1.44"
tracing-subscriber = { version = "=0.3.23", features = ["env-filter"] }
uuid = { version = "=1.23.2", features = ["v5"] }
webrtc-vad = "=0.4.0"

[build-dependencies]
capnpc = "=0.25.3"
