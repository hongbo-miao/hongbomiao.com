[package]
name = "nats-postgres-bridge"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
async-nats = "=0.47.0"
capnp = "=0.25.4"
dotenvy = "=0.15.7"
futures-util = "=0.3.32"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
sqlx = { version = "=0.8.6", features = ["json", "postgres", "runtime-tokio"] }
tokio = { version = "=1.52.0", features = ["full"] }
tracing = "=0.1.44"
tracing-subscriber = "=0.3.23"
uuid = { version = "=1.23.0", features = ["v4"] }

[build-dependencies]
capnpc = "=0.25.3"
