[project]
name = "ingest-flac-to-parquet"
version = "1.0.0"
requires-python = "==3.14.3"
dependencies = [
  "polars==1.39.3",
  "sounddevice==0.5.5",
  "soundfile==0.13.1",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
