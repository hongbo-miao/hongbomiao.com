[package]
name = "grpc-pulsar-bridge"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
dotenvy = "=0.15.7"
futures-util = { version = "0.3", default-features = false, features = [
  "sink",
] }
opus = "=0.3.1"
prost = "=0.14.3"
pulsar = "=6.7.2"
tokio = { version = "=1.52.0", features = ["full"] }
tonic = "=0.14.5"
tonic-prost = "0.14.5"
tracing = "=0.1.44"
tracing-subscriber = { version = "=0.3.23", features = ["env-filter"] }

[build-dependencies]
tonic-build = "=0.14.5"
tonic-prost-build = "0.14.5"
