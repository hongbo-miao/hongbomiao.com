---
apiVersion: v1
kind: Service
metadata:
  name: grpc-server
  namespace: audio-stream
spec:
  selector:
    app: grpc-server
  ports:
    - name: grpc
      port: 50051
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-server
  namespace: audio-stream
spec:
  replicas: 3
  selector:
    matchLabels:
      app: grpc-server
  template:
    metadata:
      labels:
        app: grpc-server
    spec:
      containers:
        - name: grpc-server
          image: grpc-server
          ports:
            - containerPort: 50051
          env:
            - name: ENVIRONMENT
              value: development
