---
apiVersion: v1
kind: Service
metadata:
  name: audio-stream-web
  namespace: audio-stream
spec:
  selector:
    app: audio-stream-web
  ports:
    - name: http
      port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audio-stream-web
  namespace: audio-stream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audio-stream-web
  template:
    metadata:
      labels:
        app: audio-stream-web
    spec:
      containers:
        - name: audio-stream-web
          image: audio-stream-web
          ports:
            - containerPort: 80
          env:
            - name: TOKEN_SERVER_URL
              value: http://pulsar-livekit-bridge.audio-stream:8080
