---
apiVersion: batch/v1
kind: Job
metadata:
  name: pulsar-topic-initialize
  namespace: audio-stream
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-pulsar
          image: docker.io/apachepulsar/pulsar:4.2.0
          command:
            - sh
            - -c
            - "until bin/pulsar-admin --admin-url http://pulsar-broker:8080 brokers healthcheck; do sleep 2; done"
      containers:
        - name: pulsar-topic-initialize
          image: docker.io/apachepulsar/pulsar:4.2.0
          command:
            - sh
            - -c
            - |
              set -e
              bin/pulsar-admin --admin-url http://pulsar-broker:8080 topics get-partitioned-topic-metadata persistent://public/default/audio-chunk > /dev/null 2>&1 || \
                bin/pulsar-admin --admin-url http://pulsar-broker:8080 topics create-partitioned-topic persistent://public/default/audio-chunk --partitions 2
              bin/pulsar-admin --admin-url http://pulsar-broker:8080 topics get-partitioned-topic-metadata persistent://public/default/audio-transcript > /dev/null 2>&1 || \
                bin/pulsar-admin --admin-url http://pulsar-broker:8080 topics create-partitioned-topic persistent://public/default/audio-transcript --partitions 2
              bin/pulsar-admin --admin-url http://pulsar-broker:8080 topics get-partitioned-topic-metadata persistent://public/default/audio-transcript-metrics > /dev/null 2>&1 || \
                bin/pulsar-admin --admin-url http://pulsar-broker:8080 topics create-partitioned-topic persistent://public/default/audio-transcript-metrics --partitions 2
