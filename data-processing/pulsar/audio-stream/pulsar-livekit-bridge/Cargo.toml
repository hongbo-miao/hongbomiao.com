[package]
name = "pulsar-livekit-bridge"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
axum = "=0.8.4"
dotenvy = "=0.15.7"
futures = "=0.3.31"
livekit = "=0.7.36"
livekit-api = "=0.4.18"
opus = "=0.3.1"
prost = "=0.14.3"
pulsar = "=6.7.2"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
tokio = { version = "=1.51.1", features = ["full"] }
tracing = "=0.1.44"
tracing-subscriber = { version = "=0.3.23", features = ["env-filter"] }
uuid = { version = "=1.23.0", features = ["v4"] }

[build-dependencies]
prost-build = "=0.14.3"
