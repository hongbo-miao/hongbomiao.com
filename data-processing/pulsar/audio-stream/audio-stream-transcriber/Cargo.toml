[package]
name = "audio-stream-transcriber"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
apache-avro = "=0.21.0"
dotenvy = "=0.15.7"
futures = "=0.3.32"
livekit = "=0.7.43"
livekit-api = "=0.5.0"
opus = "=0.3.1"
prost = "=0.14.3"
pulsar = "=6.8.0"
serde_json = "=1.0.150"
sherpa-onnx = "=1.13.2"
text-processing-rs = "=0.2.2"
tokio = { version = "=1.52.3", features = ["full"] }
tracing = "=0.1.44"
tracing-subscriber = { version = "=0.3.23", features = ["env-filter"] }

[build-dependencies]
prost-build = "=0.14.3"
