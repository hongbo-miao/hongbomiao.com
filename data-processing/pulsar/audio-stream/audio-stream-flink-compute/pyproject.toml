[project]
name = "audio-stream-flink-compute"
version = "1.0.0"
requires-python = "==3.13.13"
dependencies = [
  "apache-flink==1.20.3",
  "orjson==3.11.8",
  "pulsar-client==3.10.0",
  "pydantic==2.13.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
