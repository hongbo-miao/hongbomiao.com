[package]
name = "audio-stream-publisher"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
async-stream = "0.3.6"
dotenvy = "=0.15.7"
hound = "=3.5.1"
prost = "=0.14.3"
tokio = { version = "=1.52.0", features = ["full"] }
tonic = "=0.14.5"
tonic-prost = "0.14.5"
tracing = "=0.1.44"
tracing-subscriber = { version = "=0.3.23", features = ["env-filter"] }
uuid = { version = "=1.23.0", features = ["v4"] }

[build-dependencies]
tonic-build = "=0.14.5"
tonic-prost-build = "0.14.5"
