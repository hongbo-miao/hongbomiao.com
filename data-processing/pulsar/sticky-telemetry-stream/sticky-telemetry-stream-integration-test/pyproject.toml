[project]
name = "sticky-telemetry-stream-integration-test"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "asyncpg==0.31.0",
  "boto3==1.42.88",
  "pytest-asyncio==1.3.0",
  "tenacity==9.1.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
