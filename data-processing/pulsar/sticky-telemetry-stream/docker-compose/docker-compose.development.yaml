---
name: sticky-telemetry-stream-development
services:
  rustfs:
    image: docker.io/rustfs/rustfs:1.0.0-alpha.76
    volumes:
      - rustfs-data:/data
    environment:
      RUSTFS_ACCESS_KEY: rustfs_admin
      RUSTFS_SECRET_KEY: rustfs_passw0rd
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-initialize:
    image: docker.io/amazon/aws-cli:2.34.34
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: rustfs_admin
      AWS_SECRET_ACCESS_KEY: rustfs_passw0rd
      AWS_DEFAULT_REGION: us-west-2
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://rustfs:9000 s3 mb s3://telemetry-bucket || true;
      exit 0;
      "
    restart: "no"

  postgres:
    image: docker.io/library/postgres:18.3-trixie
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: telemetry_user
      POSTGRES_PASSWORD: telemetry_passw0rd
      POSTGRES_DB: telemetry_db
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry_user -d telemetry_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-initialize:
    image: docker.io/library/postgres:18.3-trixie
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: telemetry_passw0rd
    entrypoint: >
      sh -c "psql -h postgres -U telemetry_user -d telemetry_db -c '
        create table if not exists telemetry (
          publisher_id text not null,
          timestamp_ns bigint not null,
          temperature_c double precision,
          humidity_pct double precision,
          primary key (publisher_id, timestamp_ns)
        );
        create table if not exists batch_results (
          publisher_id text not null,
          batch_index bigint not null,
          sample_count bigint not null,
          temperature_average double precision,
          first_timestamp_ns bigint,
          last_timestamp_ns bigint,
          primary key (publisher_id, batch_index)
        );
      '"
    restart: "no"

  connector-download:
    image: docker.io/library/alpine:3.23.4
    volumes:
      - connector-data:/pulsar/connectors
    entrypoint: >
      sh -c "apk add --no-cache curl &&
      curl --silent --fail --show-error --location --retry 3 --retry-delay 5 --output /pulsar/connectors/pulsar-io-cloud-storage.nar https://github.com/streamnative/pulsar-io-cloud-storage/releases/download/v4.0.3.1/pulsar-io-cloud-storage-4.0.3.1.nar &&
      curl --silent --fail --show-error --location --retry 3 --retry-delay 5 --output /pulsar/connectors/pulsar-io-jdbc-postgres.nar https://archive.apache.org/dist/pulsar/pulsar-4.2.0/connectors/pulsar-io-jdbc-postgres-4.2.0.nar"
    restart: "no"

  mqtt-on-pulsar-download:
    image: docker.io/library/alpine:3.23.4
    volumes:
      - mqtt-on-pulsar-data:/pulsar/protocols
    entrypoint: >
      sh -c "apk add --no-cache curl &&
      curl --silent --fail --show-error --location --retry 3 --retry-delay 5 --output /pulsar/protocols/pulsar-protocol-handler-mqtt.nar https://github.com/streamnative/mop/releases/download/v4.2.0.1/pulsar-protocol-handler-mqtt-4.2.0.1.nar &&
      curl --silent --fail --show-error --location --retry 3 --retry-delay 5 --output /pulsar/protocols/pulsar-protocol-handler-mqtt-common.jar https://github.com/streamnative/mop/releases/download/v4.2.0.1/pulsar-protocol-handler-mqtt-common-4.2.0.1.jar &&
      curl --silent --fail --show-error --location --retry 3 --retry-delay 5 --output /pulsar/protocols/netty-codec-mqtt.jar https://repo1.maven.org/maven2/io/netty/netty-codec-mqtt/4.1.131.Final/netty-codec-mqtt-4.1.131.Final.jar"
    restart: "no"

  pulsar:
    image: docker.io/apachepulsar/pulsar:4.2.0
    depends_on:
      connector-download:
        condition: service_completed_successfully
      mqtt-on-pulsar-download:
        condition: service_completed_successfully
    volumes:
      - connector-data:/pulsar/connectors
      - mqtt-on-pulsar-data:/pulsar/protocols
    environment:
      # Disable GCP resource detection to prevent the main thread from hanging
      # when trying to reach the GCP metadata server in non-GCP environments
      - OTEL_JAVA_DISABLED_RESOURCE_PROVIDERS=io.opentelemetry.contrib.gcp.resource.GCPResourceProvider
    # https://github.com/streamnative/pulsar-io-cloud-storage/issues/1246
    # Switch from process to thread runtime to work around a ClassCastException (MessageIdImpl cannot be cast to MessageIdAdv) in pulsar-io-cloud-storage, caused by NAR classloader isolation
    command: >
      sh -c "sed -i
      's/functionRuntimeFactoryClassName: org.apache.pulsar.functions.runtime.process.ProcessRuntimeFactory/functionRuntimeFactoryClassName: org.apache.pulsar.functions.runtime.thread.ThreadRuntimeFactory/'
      conf/functions_worker.yml &&
      echo '' >> conf/standalone.conf &&
      echo 'messagingProtocols=mqtt' >> conf/standalone.conf &&
      echo 'protocolHandlerDirectory=/pulsar/protocols' >> conf/standalone.conf &&
      echo 'mqttListeners=mqtt://0.0.0.0:1883' >> conf/standalone.conf &&
      echo 'mqttAdvertisedListeners=mqtt://pulsar:1883' >> conf/standalone.conf &&
      unzip -j -o /pulsar/connectors/pulsar-io-jdbc-postgres.nar 'META-INF/bundled-dependencies/postgresql-*.jar' -d /tmp &&
      export PULSAR_EXTRA_CLASSPATH=\"$(ls /tmp/postgresql-*.jar | head -1):/pulsar/protocols/pulsar-protocol-handler-mqtt-common.jar:/pulsar/protocols/netty-codec-mqtt.jar\" &&
      bin/pulsar standalone"
    ports:
      - "127.0.0.1:1883:1883"
    healthcheck:
      test: [
        "CMD",
        "bin/pulsar-admin",
        "brokers",
        "healthcheck",
      ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  topic-initialize:
    image: docker.io/apachepulsar/pulsar:4.2.0
    depends_on:
      pulsar:
        condition: service_healthy
    entrypoint: >
      sh -c "bin/pulsar-admin --admin-url http://pulsar:8080 topics create persistent://public/default/sensor-telemetry-raw || true &&
      bin/pulsar-admin --admin-url http://pulsar:8080 topics create persistent://public/default/sensor-telemetry || true &&
      bin/pulsar-admin --admin-url http://pulsar:8080 topics create persistent://public/default/sensor-telemetry-batch-results || true"
    restart: "no"

  sink-initialize:
    image: docker.io/apachepulsar/pulsar:4.2.0
    depends_on:
      pulsar:
        condition: service_healthy
      topic-initialize:
        condition: service_completed_successfully
      rustfs-initialize:
        condition: service_completed_successfully
    volumes:
      - connector-data:/pulsar/connectors
      - ../pulsar/cloud-storage-sink.yaml:/etc/pulsar/cloud-storage-sink.yaml:ro
    entrypoint: >
      sh -c "bin/pulsar-admin --admin-url http://pulsar:8080 sinks create
      --tenant public
      --namespace default
      --name cloud-storage-sink
      --inputs persistent://public/default/sensor-telemetry
      --archive /pulsar/connectors/pulsar-io-cloud-storage.nar
      --sink-config-file /etc/pulsar/cloud-storage-sink.yaml
      --parallelism 1 || true"
    restart: "no"

  jdbc-sink-initialize:
    image: docker.io/apachepulsar/pulsar:4.2.0
    depends_on:
      pulsar:
        condition: service_healthy
      topic-initialize:
        condition: service_completed_successfully
      postgres-initialize:
        condition: service_completed_successfully
    volumes:
      - connector-data:/pulsar/connectors
      - ../pulsar/jdbc-postgres-sink.yaml:/etc/pulsar/jdbc-postgres-sink.yaml:ro
    entrypoint: >
      sh -c "bin/pulsar-admin --admin-url http://pulsar:8080 sinks create
      --tenant public
      --namespace default
      --name jdbc-postgres-sink
      --inputs persistent://public/default/sensor-telemetry
      --archive /pulsar/connectors/pulsar-io-jdbc-postgres.nar
      --sink-config-file /etc/pulsar/jdbc-postgres-sink.yaml
      --parallelism 1 || true"
    restart: "no"

  jdbc-batch-results-sink-initialize:
    image: docker.io/apachepulsar/pulsar:4.2.0
    depends_on:
      pulsar:
        condition: service_healthy
      topic-initialize:
        condition: service_completed_successfully
      postgres-initialize:
        condition: service_completed_successfully
    volumes:
      - connector-data:/pulsar/connectors
      - ../pulsar/jdbc-postgres-batch-results-sink.yaml:/etc/pulsar/jdbc-postgres-batch-results-sink.yaml:ro
    entrypoint: >
      sh -c "bin/pulsar-admin --admin-url http://pulsar:8080 sinks create
      --tenant public
      --namespace default
      --name jdbc-postgres-batch-results-sink
      --inputs persistent://public/default/sensor-telemetry-batch-results
      --archive /pulsar/connectors/pulsar-io-jdbc-postgres.nar
      --sink-config-file /etc/pulsar/jdbc-postgres-batch-results-sink.yaml
      --parallelism 1 || true"
    restart: "no"

  mqtt-on-pulsar-ready:
    image: docker.io/library/alpine:3.23.4
    depends_on:
      pulsar:
        condition: service_healthy
      topic-initialize:
        condition: service_completed_successfully
    entrypoint: >
      sh -c "apk add --no-cache mosquitto-clients &&
      until mosquitto_pub -h pulsar -p 1883 -t healthcheck -m ok -q 1 2>/dev/null; do
        sleep 5;
      done"
    restart: "no"

  mqtt-publisher:
    build:
      context: ..
      dockerfile: sticky-telemetry-stream-mqtt-publisher/Dockerfile
    depends_on:
      mqtt-on-pulsar-ready:
        condition: service_completed_successfully
    environment:
      - MQTT_BROKER_HOST=pulsar
      - MQTT_BROKER_PORT=1883
    restart: unless-stopped
    deploy:
      replicas: 2

  pulsar-publisher:
    build:
      context: ..
      dockerfile: sticky-telemetry-stream-pulsar-publisher/Dockerfile
    depends_on:
      topic-initialize:
        condition: service_completed_successfully
    environment:
      - PULSAR_SERVICE_URL=pulsar://pulsar:6650
    restart: unless-stopped
    deploy:
      replicas: 2

  validate-function:
    build:
      context: ..
      dockerfile: sticky-telemetry-stream-validate-function/Dockerfile
    depends_on:
      topic-initialize:
        condition: service_completed_successfully
    environment:
      - PULSAR_SERVICE_URL=pulsar://pulsar:6650
    restart: unless-stopped

  subscriber:
    build:
      context: ..
      dockerfile: sticky-telemetry-stream-subscriber/Dockerfile
    depends_on:
      topic-initialize:
        condition: service_completed_successfully
    environment:
      - PULSAR_SERVICE_URL=pulsar://pulsar:6650
    restart: unless-stopped
    deploy:
      replicas: 2

  flink-compute:
    build:
      context: ../sticky-telemetry-stream-flink-compute
      dockerfile: Dockerfile
    depends_on:
      pulsar:
        condition: service_healthy
      topic-initialize:
        condition: service_completed_successfully
    environment:
      - PULSAR_SERVICE_URL=pulsar://pulsar:6650
      - INPUT_TOPIC=persistent://public/default/sensor-telemetry
      - OUTPUT_TOPIC=persistent://public/default/sensor-telemetry-batch-results
      - SUBSCRIPTION_NAME=flink-compute-subscription
      - BATCH_SIZE=10
      - PARALLELISM=2
    restart: unless-stopped

  dekaf:
    image: docker.io/visortelle/dekaf:1.1.0
    depends_on:
      pulsar:
        condition: service_healthy
    environment:
      - DEKAF_PULSAR_WEB_URL=http://pulsar:8080
      - DEKAF_PULSAR_BROKER_URL=pulsar://pulsar:6650
    ports:
      - "127.0.0.1:8090:8090"
    restart: unless-stopped

volumes:
  rustfs-data:
  postgres-data:
  connector-data:
  mqtt-on-pulsar-data:
