[project]
name = "sticky-telemetry-stream-flink-compute"
version = "1.0.0"
requires-python = "==3.12.13"
dependencies = [
  "apache-flink==1.20.4",
  "pulsar-client==3.11.0",
  "pydantic==2.13.4",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
