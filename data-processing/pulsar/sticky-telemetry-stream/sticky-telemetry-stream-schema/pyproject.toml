[project]
name = "sticky-telemetry-stream-schema"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "pulsar-client[avro]==3.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sticky_telemetry_stream_schema"]

[tool.uv]
required-version = ">=0.11.0"
