[package]
name = "sticky-telemetry-stream-mqtt-publisher"
version = "1.0.0"
edition = "2024"

[dependencies]
anyhow = "=1.0.102"
prost = "=0.14.3"
rumqttc = "=0.25.1"
tokio = { version = "=1.51.1", features = ["full"] }
tracing = "=0.1.44"
tracing-subscriber = { version = "=0.3.23", features = ["env-filter"] }
uuid = { version = "=1.23.0", features = ["v4"] }

[build-dependencies]
prost-build = "=0.14.3"
