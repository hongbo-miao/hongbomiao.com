[project]
name = "sticky-telemetry-stream-pulsar-publisher"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "pulsar-client[avro]==3.11.0",
  "sticky-telemetry-stream-schema",
  "typing-extensions==4.15.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.uv.sources]
sticky-telemetry-stream-schema = { path = "../sticky-telemetry-stream-schema" }

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
