[project]
name = "cocoindex-embed-markdown-to-postgres"
version = "1.0.0"
requires-python = "==3.14.4"
dependencies = [
  "cocoindex[embeddings]==0.3.37",
  "pydantic==2.13.2",
]

[dependency-groups]
dev = [
  "poethepoet==0.44.0",
  "prefect==3.6.26",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "cocoindex update src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
