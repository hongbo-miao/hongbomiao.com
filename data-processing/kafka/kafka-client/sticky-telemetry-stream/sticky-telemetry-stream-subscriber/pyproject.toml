[project]
name = "sticky-telemetry-stream-subscriber"
version = "1.0.0"
requires-python = "==3.14.5"
dependencies = [
  "certifi==2026.5.20",
  "confluent-kafka[avro]==2.14.2",
  "typing-extensions==4.15.0",
]

[dependency-groups]
dev = [
  "poethepoet==0.46.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.3",
]

[tool.uv]
package = false
required-version = ">=0.11.0"

[tool.poe.tasks]
dev = "python src/main.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
