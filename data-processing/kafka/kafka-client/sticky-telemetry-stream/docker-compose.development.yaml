name: sticky-telemetry-stream-development
services:
  kafka:
    image: docker.io/apache/kafka:4.2.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS=2000
    healthcheck:
      test: [
        "CMD",
        "/opt/kafka/bin/kafka-broker-api-versions.sh",
        "--bootstrap-server",
        "localhost:9092",
      ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  topic-initialize:
    image: docker.io/apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      sh -c "/opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic sensor-telemetry-streams --partitions 2 --replication-factor 1 --bootstrap-server kafka:9092"
    restart: "no"

  publisher:
    build:
      context: .
      dockerfile: sticky-telemetry-stream-publisher/Dockerfile
    depends_on:
      topic-initialize:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    deploy:
      replicas: 3

  subscriber:
    build:
      context: .
      dockerfile: sticky-telemetry-stream-subscriber/Dockerfile
    depends_on:
      topic-initialize:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    deploy:
      replicas: 2
