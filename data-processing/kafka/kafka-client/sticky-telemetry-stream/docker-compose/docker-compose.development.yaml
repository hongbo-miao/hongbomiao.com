---
name: sticky-telemetry-stream-development
services:
  rustfs:
    image: docker.io/rustfs/rustfs:1.0.0-alpha.76
    volumes:
      - rustfs-data:/data
    environment:
      RUSTFS_ACCESS_KEY: rustfs_admin
      RUSTFS_SECRET_KEY: rustfs_passw0rd
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs-initialize:
    image: docker.io/amazon/aws-cli:2.34.32
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: rustfs_admin
      AWS_SECRET_ACCESS_KEY: rustfs_passw0rd
      AWS_DEFAULT_REGION: us-west-2
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url http://rustfs:9000 s3 mb s3://telemetry-bucket || true;
      exit 0;
      "
    restart: "no"

  schema-registry:
    image: docker.io/confluentinc/cp-schema-registry:8.2.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: docker.io/apache/kafka:4.2.0
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_MIN_SESSION_TIMEOUT_MS=2000
    healthcheck:
      test: [
        "CMD",
        "/opt/kafka/bin/kafka-broker-api-versions.sh",
        "--bootstrap-server",
        "localhost:9092",
      ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  topic-initialize:
    image: docker.io/apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      sh -c "/opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic sensor-telemetry-streams --partitions 2 --replication-factor 1 --bootstrap-server kafka:9092"
    restart: "no"

  kafka-connect:
    image: docker.io/confluentinc/cp-kafka-connect:8.2.0
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      AWS_ACCESS_KEY_ID: rustfs_admin
      AWS_SECRET_ACCESS_KEY: rustfs_passw0rd
    command: >
      bash -c "confluent-hub install --no-prompt confluentinc/kafka-connect-s3:10.5.22 &&
      /etc/confluent/docker/run"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  s3-sink-initialize:
    image: docker.io/curlimages/curl:8.19.0
    depends_on:
      kafka-connect:
        condition: service_healthy
      topic-initialize:
        condition: service_completed_successfully
      rustfs-initialize:
        condition: service_completed_successfully
    volumes:
      - ../kafka-connect/s3-sink-connector.json:/etc/kafka-connect/s3-sink-connector.json:ro
    entrypoint: >
      curl --silent --fail --show-error -X PUT
      -H "Content-Type: application/json"
      -d @/etc/kafka-connect/s3-sink-connector.json
      http://kafka-connect:8083/connectors/s3-sink-connector/config
    restart: "no"

  publisher:
    build:
      context: ..
      dockerfile: sticky-telemetry-stream-publisher/Dockerfile
    depends_on:
      topic-initialize:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    deploy:
      replicas: 3

  subscriber:
    build:
      context: ..
      dockerfile: sticky-telemetry-stream-subscriber/Dockerfile
    depends_on:
      topic-initialize:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    deploy:
      replicas: 2

volumes:
  rustfs-data:
