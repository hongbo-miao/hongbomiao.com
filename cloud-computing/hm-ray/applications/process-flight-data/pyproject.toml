[project]
name = "process-flight-data"
version = "1.0.0"
requires-python = "==3.13.12"
dependencies = [
  "mlflow==3.10.1",
  "polars==1.39.3",
  "pydantic-settings==2.13.1",
  "ray[default]==2.54.1",
]

[dependency-groups]
dev = [
  "poethepoet==0.43.0",
  "pytest-cov==7.1.0",
  "pytest==9.0.2",
]

[tool.uv]
package = false
required-version = ">=0.10.0"

[tool.poe.tasks]
submit = "python src/submit.py"
test = "pytest --verbose --verbose"
test-coverage = "pytest --cov=. --cov-report=xml"
